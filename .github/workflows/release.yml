name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Validate release metadata
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import sys
          import tomllib

          tag = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          with open("pyproject.toml", "rb") as f:
              pyproject = tomllib.load(f)
          with open("server.json", "r", encoding="utf-8") as f:
              server = json.load(f)

          project_version = pyproject["project"]["version"]
          package_version = server["packages"][0]["version"]
          errors = []
          if tag != project_version:
              errors.append(f"tag {tag!r} does not match pyproject version {project_version!r}")
          if server["version"] != project_version:
              errors.append("server.json version does not match pyproject version")
          if package_version != project_version:
              errors.append("server.json package version does not match pyproject version")
          if "b" in project_version:
              classifiers = pyproject["project"].get("classifiers", [])
              if "Development Status :: 4 - Beta" not in classifiers:
                  errors.append("beta version must use the PyPI beta classifier")
          else:
              classifiers = pyproject["project"].get("classifiers", [])
              if "Development Status :: 5 - Production/Stable" not in classifiers:
                  errors.append("stable version must use the PyPI stable classifier")
          release_notes = Path("docs") / "releases" / f"v{project_version}.md"
          if not release_notes.exists():
              errors.append(f"release notes not found: {release_notes}")

          if errors:
              for error in errors:
                  print(f"ERROR: {error}", file=sys.stderr)
              sys.exit(1)
          print(f"Release metadata validated for {project_version}")
          PY

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test
        run: uv run pytest -q

      - name: Build sdist + wheel
        run: uv build --no-sources

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: build-and-publish
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server metadata
        run: ./mcp-publisher publish
